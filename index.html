<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxVault | 典藏資產數位化管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050608;
            color: #cbd5e1;
        }

        .glass {
            background: rgba(16, 18, 24, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-card {
            background: #101218;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .premium-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-4px);
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 隱藏捲軸但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="no-scrollbar">

    <!-- 錯誤提示 Bar -->
    <div id="error-bar" class="fixed top-0 w-full z-[100] bg-rose-600 text-white text-[10px] font-black py-2 px-6 hidden justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            <span id="error-message">錯誤訊息</span>
        </div>
        <button onclick="hideError()"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>

    <!-- 導航列 -->
    <nav class="fixed top-0 w-full z-40 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="diamond" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black text-white italic tracking-tighter">LUX<span class="text-indigo-500">VAULT</span></h1>
            </div>

            <div class="hidden md:flex items-center bg-white/5 rounded-2xl px-4 py-2 border border-white/10 group focus-within:border-indigo-500/50 transition-all">
                <i data-lucide="search" class="text-slate-500 w-4 h-4"></i>
                <input type="text" id="search-input" placeholder="搜尋雲端資料庫..." class="bg-transparent border-none text-xs text-white px-3 focus:outline-none w-64 placeholder:text-slate-700">
            </div>

            <div id="auth-section" class="flex items-center gap-4">
                <!-- 登入按鈕將由 JS 動態渲染 -->
                <div class="animate-pulse w-24 h-10 bg-white/5 rounded-xl"></div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <!-- 數據指標 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-12">
            <div class="lg:col-span-4 space-y-6">
                <div class="premium-card p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
                        <i data-lucide="wallet" class="w-32 h-32"></i>
                    </div>
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-2 flex items-center gap-2">
                        <i data-lucide="globe" class="text-indigo-500 w-3 h-3"></i> 雲端資產估值
                    </p>
                    <h2 id="total-value" class="text-4xl font-black text-white">$ 0</h2>
                    <div class="flex items-center gap-2 mt-4 text-[10px] font-bold text-indigo-400 bg-indigo-500/5 py-1 px-3 rounded-lg w-fit">
                        <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> 資料與 Firestore 同步中
                    </div>
                </div>
                <div class="premium-card p-6 rounded-3xl flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-black text-slate-500 uppercase mb-1">連線狀態</p>
                        <p class="text-xs font-mono text-emerald-400 flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                            Secure
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Session ID</p>
                        <p id="user-id-display" class="text-[9px] font-mono text-slate-600">Initializing...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 premium-card p-8 rounded-[2.5rem] flex items-center justify-center">
                <div class="text-center">
                    <i data-lucide="line-chart" class="w-12 h-12 text-indigo-500/20 mx-auto mb-4"></i>
                    <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">市場趨勢圖表預留區</p>
                </div>
            </div>
        </div>

        <!-- 藏品清單標題 -->
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-lg font-black text-white tracking-tighter flex items-center gap-3 italic">
                <div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
                CLOUD INVENTORY <span id="item-count" class="text-indigo-500 font-normal ml-1">(0)</span>
            </h3>
            <button onclick="showModal('add-modal')" class="px-5 py-2.5 bg-indigo-600 rounded-xl text-[10px] font-black uppercase tracking-widest text-white hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-600/10 flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> 新增雲端資產
            </button>
        </div>

        <!-- 網格容器 -->
        <div id="collection-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- 骨架屏 -->
            <div class="premium-card rounded-[2.2rem] p-3 shimmer h-64"></div>
            <div class="premium-card rounded-[2.2rem] p-3 shimmer h-64"></div>
            <div class="premium-card rounded-[2.2rem] p-3 shimmer h-64"></div>
            <div class="premium-card rounded-[2.2rem] p-3 shimmer h-64"></div>
        </div>
    </main>

    <!-- 新增資產 Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="hideModal('add-modal')"></div>
        <div class="relative bg-[#101218] border border-white/10 w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-white uppercase tracking-tighter mb-8 italic">Register New Asset</h3>
            <div class="space-y-6">
                <div id="image-preview-container" class="relative aspect-video rounded-3xl bg-white/5 border border-dashed border-white/20 flex items-center justify-center overflow-hidden group hover:border-indigo-500/50 transition-all">
                    <div id="placeholder-content" class="text-center text-slate-500 group-hover:text-indigo-400">
                        <i data-lucide="image" class="mx-auto mb-2 w-8 h-8"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">選擇圖片</p>
                    </div>
                    <img id="preview-img" class="hidden w-full h-full object-cover">
                    <input type="file" id="file-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2 pl-1">資產標題</label>
                    <input type="text" id="asset-name" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:outline-none focus:border-indigo-500/50 transition-all" placeholder="例如: Rolex Submariner">
                </div>
                <button id="submit-btn" onclick="uploadAsset()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-indigo-600/20 hover:bg-indigo-500 transition-all flex items-center justify-center gap-3">
                    確認並發布至雲端
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyDMe7zNs3dyhVknYJIEVWcPa5E9x5sojQQ",
            authDomain: "collection-1fdb4.firebaseapp.com",
            projectId: "collection-1fdb4",
            storageBucket: "collection-1fdb4.firebasestorage.app",
            messagingSenderId: "373963287937",
            appId: "1:373963287937:web:a937c1544ba065fd0d8c80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "collection-1fdb4";
        
        let currentUser = null;
        let selectedBase64 = null;

        // 全域函數綁定
        window.hideError = () => document.getElementById('error-bar').classList.add('hidden');
        window.showError = (msg) => {
            const bar = document.getElementById('error-bar');
            document.getElementById('error-message').innerText = msg;
            bar.classList.remove('hidden');
            bar.classList.add('flex');
            setTimeout(window.hideError, 5000);
        };
        
        // 修復 id undefined 錯誤：使用正確的大括號函數體
        window.showModal = (id) => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('hidden');
                el.classList.add('flex');
            }
        };
        
        window.hideModal = (id) => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('hidden');
                el.classList.remove('flex');
            }
        };

        // 1. 身份驗證初始化
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
                window.showError("安全身份連線失敗，請刷新。");
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            renderAuthUI(user);
            if (user) {
                document.getElementById('user-id-display').innerText = user.uid.substring(0, 10) + '...';
                startListening();
            }
        });

        const renderAuthUI = (user) => {
            const container = document.getElementById('auth-section');
            if (user && !user.isAnonymous) {
                container.innerHTML = `
                    <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-xl border border-white/10">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=User'}" class="w-8 h-8 rounded-lg">
                        <div class="hidden lg:block text-left">
                            <p class="text-[9px] font-black text-white leading-none uppercase truncate w-20">${user.displayName}</p>
                            <p class="text-[8px] text-emerald-500 font-bold tracking-wider">CLOUD SECURE</p>
                        </div>
                        <button id="logout-btn" class="p-1.5 text-slate-500 hover:text-rose-400 transition-colors">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                container.innerHTML = `
                    <button id="login-btn" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 rounded-xl text-white hover:bg-indigo-500 transition-all text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-500/20">
                        <i data-lucide="user" class="w-4 h-4"></i> Google 登入
                    </button>
                `;
                document.getElementById('login-btn').onclick = async () => {
                    try {
                        await signInWithPopup(auth, new GoogleAuthProvider());
                    } catch (e) {
                        if (e.code === 'auth/unauthorized-domain') {
                            window.showError(`請將 ${window.location.hostname} 加入 Firebase 授權名單`);
                        }
                    }
                };
            }
            lucide.createIcons();
        };

        // 2. 資料監聽 (遵循 RULE 1: /artifacts/{appId}/public/data/{collectionName})
        let unsubscribe = null;
        const startListening = () => {
            if (unsubscribe) unsubscribe();
            const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'collections');
            
            unsubscribe = onSnapshot(collRef, (snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGrid(data);
                updateStats(data);
            }, (err) => {
                console.error(err);
                if (err.code === 'permission-denied') window.showError("Firestore 權限不足，請檢查規則。");
            });
        };

        const renderGrid = (items) => {
            const grid = document.getElementById('collection-grid');
            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 flex flex-col items-center justify-center border-2 border-dashed border-white/5 rounded-[3rem]">
                    <i data-lucide="layers" class="text-slate-800 w-12 h-12 mb-4"></i>
                    <p class="text-slate-600 text-xs font-bold uppercase tracking-widest">資料庫為空</p>
                </div>`;
            } else {
                grid.innerHTML = items.map(item => `
                    <div class="group premium-card rounded-[2.2rem] p-3 cursor-pointer">
                        <div class="aspect-square rounded-[1.8rem] overflow-hidden relative">
                            <img src="${item.imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                                <p class="text-[9px] font-black text-white uppercase tracking-widest flex items-center gap-2">查看詳情 <i data-lucide="arrow-up-right" class="w-3 h-3"></i></p>
                            </div>
                            <span class="absolute top-3 left-3 px-3 py-1 bg-black/80 backdrop-blur-md border border-white/10 rounded-full text-[8px] font-black text-indigo-400 uppercase tracking-wider">${item.cat || '典藏資產'}</span>
                        </div>
                        <div class="p-4">
                            <h4 class="text-xs font-black text-white truncate mb-2 group-hover:text-indigo-400 transition-colors">${item.name}</h4>
                            <div class="flex justify-between items-end">
                                <p class="text-sm font-black text-white tracking-tight">${item.price || '$ 0'}</p>
                                <p class="text-[9px] text-slate-600 font-bold">${item.ownerName || '匿名訪客'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        };

        const updateStats = (data) => {
            document.getElementById('item-count').innerText = `(${data.length})`;
            const total = data.length * 52400;
            document.getElementById('total-value').innerText = `$ ${total.toLocaleString()}`;
        };

        // 3. 圖片上傳處理
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 800000) return window.showError("圖片過大 (限 800KB)");
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedBase64 = event.target.result;
                    document.getElementById('preview-img').src = selectedBase64;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('placeholder-content').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // 4. 資料寫入
        window.uploadAsset = async () => {
            const name = document.getElementById('asset-name').value;
            if (!name || !currentUser) return window.showError("請輸入名稱或確認登入狀態");
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> 處理中...';
            lucide.createIcons();

            try {
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'collections');
                await addDoc(collRef, {
                    name: name,
                    cat: "數位典藏",
                    imgUrl: selectedBase64 || "https://images.unsplash.com/photo-1510127034890-ba27508e9f1c?q=80&w=400",
                    price: "$ " + (Math.floor(Math.random() * 50000) + 10000).toLocaleString(),
                    ownerName: currentUser.isAnonymous ? "訪客用戶" : (currentUser.displayName || "Google 用戶"),
                    ownerId: currentUser.uid,
                    createdAt: new Date().toISOString()
                });
                
                window.hideModal('add-modal');
                // Reset
                document.getElementById('asset-name').value = "";
                selectedBase64 = null;
                document.getElementById('preview-img').classList.add('hidden');
                document.getElementById('placeholder-content').classList.remove('hidden');
            } catch (err) {
                window.showError("發布失敗，請檢查網路。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認並發布至雲端";
                lucide.createIcons();
            }
        };

        // 初始化
        initAuth();
        lucide.createIcons();
    </script>
</body>
</html>
